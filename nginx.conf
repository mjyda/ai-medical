events {
    worker_connections 10000;  # 支持10000并发连接
    use epoll;
    multi_accept on;
}

http {
    # 优化TCP连接
    tcp_nodelay on;
    tcp_nopush on;
    
    # 保持连接配置
    keepalive_timeout 65;
    keepalive_requests 10000;
    
    # 上游服务器配置（支持10000+并发）
    upstream streamlit_backend {
        least_conn;  # 最少连接数负载均衡策略
        server streamlit1:8501 max_fails=3 fail_timeout=30s;
        server streamlit2:8501 max_fails=3 fail_timeout=30s;
        server streamlit3:8501 max_fails=3 fail_timeout=30s;
        server streamlit4:8501 max_fails=3 fail_timeout=30s;
        server streamlit5:8501 max_fails=3 fail_timeout=30s;
        server streamlit6:8501 max_fails=3 fail_timeout=30s;
        server streamlit7:8501 max_fails=3 fail_timeout=30s;
        server streamlit8:8501 max_fails=3 fail_timeout=30s;
        server streamlit9:8501 max_fails=3 fail_timeout=30s;
        server streamlit10:8501 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name localhost;

        # 配置大文件上传
        client_max_body_size 100M;

        # 代理设置
        location / {
            proxy_pass http://streamlit_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket支持
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 超时设置（支持长连接）
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # 缓冲区设置（优化性能）
            proxy_buffering on;
            proxy_buffer_size 64k;
            proxy_buffers 8 64k;
            proxy_busy_buffers_size 128k;
            
            # 禁用缓存
            proxy_cache_bypass $http_upgrade;
        }

        # 健康检查
        location /health {
            access_log off;
            return 200 "OK\n";
        }
    }

    # 可选：HTTPS配置
    # server {
    #     listen 443 ssl;
    #     server_name localhost;
    #     
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     
    #     location / {
    #         proxy_pass http://streamlit_backend;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #     }
    # }
}
