# 与下方 postgres 服务的 POSTGRES_* 保持一致；避免容器内 .env 或旧默认值与数据卷初始化密码不一致。
x-postgres-client-env: &postgres_client_env
  POSTGRESQL_HOST: postgres
  POSTGRESQL_PORT: "5432"
  POSTGRESQL_USER: postgres
  POSTGRESQL_PASSWORD: password
  POSTGRESQL_DATABASE: vector_db

# 本地 OpenAI 兼容网关（qwen3-coder-30b）：网线 10.204.220.21 / 无线 10.45.164.21，在项目根 .env 里设置 LOCAL_LLM_BASE_URL 即可切换。
x-local-llm-env: &local_llm_env
  LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://10.204.220.21:8000/v1}
  LOCAL_LLM_MODEL_NAME: ${LOCAL_LLM_MODEL_NAME:-qwen3-coder-30b}
  LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-sk-95ec443dc9594cab9fc7e96fff5f201f}

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: pgvector
    environment:
      POSTGRES_DB: vector_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    # 默认 max_connections=100；多容器 + 旧版大连接池会占满，适当提高。
    command: ["postgres", "-c", "max_connections=200"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_DATABASE: guiguxiaozhi
      MYSQL_USER: root
      MYSQL_PASSWORD: "123456"
      MYSQL_ROOT_PASSWORD: "123456"
      MAX_CONNECTIONS: "1000"
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p123456"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.adminCommand(\"ping\")'"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  api:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: kb-api
    command:
      [
        "uvicorn",
        "app.backend.api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8001",
      ]
    ports:
      - "8001:8001"
    # 与 celery_worker 共享上传目录：否则 API 写入的文件路径在 Worker 容器中不存在，解析/向量化会失败。
    volumes:
      - kb_uploads:/app/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: [*postgres_client_env, *local_llm_env]
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: streamlit-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      <<: [*postgres_client_env, *local_llm_env]
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      MYSQL_HOST: mysql
      MONGODB_HOST: mongodb
      DOC_API_BASE_URL: http://api:8001
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: celery-kb-worker
    command: ["celery", "-A", "app.workers.celery_app", "worker", "--loglevel=info"]
    volumes:
      - kb_uploads:/app/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      <<: [*postgres_client_env, *local_llm_env]
      REDIS_HOST: redis
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "0.5"

  nginx:
    image: nginx:latest
    container_name: nginx-loadbalancer
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - streamlit
      - api
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

volumes:
  postgres_data:
  redis_data:
  mysql_data:
  mongodb_data:
  kb_uploads:
